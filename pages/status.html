<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="../">
    <title>ruih8gtaのステータス</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/status.css">
    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="header-container"></div> <!-- ヘッダーを挿入するコンテナ -->
    <div class="status-window">
        <div class="status-header">
            <h1>ステータス</h1>
        </div>
        <div class="status-content">
            <div class="character-info" id="character-info">
                <!-- プロフィールは data/profile.json から動的に生成されます -->
            </div>
            <div class="stats">
                <div class="stats-text" id="stats-text">
                    <!-- ステータスは data/profile.json から動的に生成されます -->
                </div>
                <div class="chart-container">
                    <canvas id="skillChart"></canvas>
                    <button id="reset-chart-button" style="display: none;">もどる</button>
                </div>
            </div>
            <div class="skills">
                <h2>スキルマップ</h2>
                <div class="skill-tree" id="skill-tree">
                    <!-- スキルツリーは data/skills.json から動的に生成されます -->
                </div>
            </div>
        </div>
    </div>

    <!-- モーダルウィンドウ -->
    <div id="skill-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2 id="modal-skill-title"></h2>
            <p id="modal-skill-description"></p>
        </div>
    </div>

    <script src="js/header.js"></script> <!-- 外部JavaScriptを読み込み -->
    <script src="js/status.js"></script>
</body>
</html>
